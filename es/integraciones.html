<style>
:root {
  --ink: #0A1230;
  --ink-2: #111B42;
  --ink-3: #1B2657;
  --paper: #F6F4EE;
  --paper-2: #EBE7DB;
  --line: rgba(10, 18, 48, 0.12);
  --line-strong: rgba(10, 18, 48, 0.22);
  --mute: rgba(10, 18, 48, 0.58);
  --accent: #D4FF3F; /* electric lime */
  --accent-2: #5B8CFF; /* electric blue */
  --pos: #00B67A;
  --neg: #E24A4A;
  --font-sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-serif: 'Instrument Serif', serif;
}

/* Palette swaps via data attribute */
html[data-palette="onyx-lime"] {
  --ink: #0B0B0C;
  --ink-2: #141416;
  --ink-3: #1D1D21;
  --paper: #F2F1EC;
  --accent: #C6FF2E;
  --accent-2: #FF6B3D;
}
html[data-palette="green-cream"] {
  --ink: #0F2A1F;
  --ink-2: #163A2B;
  --ink-3: #1F4A38;
  --paper: #F4EFE2;
  --paper-2: #E8E1CE;
  --accent: #D4FF3F;
  --accent-2: #FF8A3D;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

.container { max-width: 1360px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .container { padding: 0 20px; } }

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(14px);
  background: color-mix(in oklab, var(--paper) 82%, transparent);
  border-bottom: 1px solid var(--line);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
.logo { font-family: var(--font-sans); font-weight: 600; letter-spacing: -0.02em; font-size: 19px; display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 22px; height: 22px; position: relative; display: inline-block; }
.logo-mark::before, .logo-mark::after { content: ""; position: absolute; inset: 0; border-radius: 4px; }
.logo-mark::before { background: var(--ink); transform: translate(-3px, -3px); }
.logo-mark::after { background: var(--accent); transform: translate(3px, 3px); mix-blend-mode: multiply; }
.nav-links { display: flex; gap: 28px; font-size: 14px; color: var(--ink); opacity: 0.75; }
.nav-links a:hover { opacity: 1; color: var(--ink); }
.nav-right { display: flex; align-items: center; gap: 14px; }
.lang-toggle { display: inline-flex; border: 1px solid var(--line-strong); border-radius: 999px; overflow: hidden; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; }
.lang-toggle button { background: transparent; border: 0; padding: 7px 12px; color: var(--mute); }
.lang-toggle button.active { background: var(--ink); color: var(--paper); }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 999px; font-weight: 500; font-size: 14px; border: 1px solid transparent; transition: transform 0.1s ease; }
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: var(--ink-2); }
.btn-accent { background: var(--accent); color: var(--ink); }
.btn-accent:hover { filter: brightness(0.96); }
.btn-ghost { border-color: var(--line-strong); color: var(--ink); background: transparent; }
.btn-ghost:hover { background: rgba(10,18,48,0.04); }

@media (max-width: 820px) { .nav-links { display: none; } }

/* Hero */
.hero { padding: 56px 0 80px; position: relative; }
.hero-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px; align-items: center; }
@media (max-width: 1040px) { .hero-grid { grid-template-columns: 1fr; } }

.eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); display: inline-flex; align-items: center; gap: 10px; }
.eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pos); box-shadow: 0 0 0 4px color-mix(in oklab, var(--pos) 20%, transparent); animation: blink 2s infinite; }
@keyframes blink { 50% { opacity: 0.4; } }

.h1 { font-family: var(--font-sans); font-weight: 500; font-size: clamp(44px, 6.2vw, 88px); line-height: 0.95; letter-spacing: -0.035em; margin: 20px 0 24px; }
.h1 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--ink); }
.h1 .hl { background: var(--accent); padding: 0 6px; border-radius: 4px; display: inline-block; transform: rotate(-0.5deg); }
.lede { font-size: 19px; line-height: 1.45; color: var(--mute); max-width: 560px; letter-spacing: -0.005em; }
.hero-ctas { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
.hero-trust { margin-top: 36px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--mute); text-transform: uppercase; }

/* Ticker strip */
.tickers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 44px; }
@media (max-width: 720px) { .tickers { grid-template-columns: repeat(2, 1fr); } }
.ticker { border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; background: color-mix(in oklab, var(--paper) 60%, white); }
.ticker-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mute); }
.ticker-value { font-family: var(--font-sans); font-weight: 500; font-size: 28px; letter-spacing: -0.02em; margin-top: 6px; font-variant-numeric: tabular-nums; }
.ticker-delta { font-family: var(--font-mono); font-size: 11px; margin-top: 4px; }
.ticker-delta.pos { color: var(--pos); }
.ticker-delta.neg { color: var(--neg); }

/* Hero dashboard */
.hero-card {
  background: var(--ink); color: var(--paper); border-radius: 20px; padding: 22px; position: relative;
  box-shadow: 0 30px 80px -30px rgba(10,18,48,0.45), 0 2px 0 var(--ink-3) inset;
  overflow: hidden;
}
.hero-card::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(600px 300px at 80% -10%, color-mix(in oklab, var(--accent) 22%, transparent), transparent 60%);
}
.hc-top { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 11px; color: color-mix(in oklab, var(--paper) 70%, transparent); letter-spacing: 0.08em; }
.hc-top .live { display: inline-flex; align-items: center; gap: 8px; }
.hc-top .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 30%, transparent); }
.hc-title { font-size: 13px; margin-top: 14px; color: color-mix(in oklab, var(--paper) 72%, transparent); font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; }
.hc-big { font-size: 56px; font-weight: 400; letter-spacing: -0.03em; margin: 4px 0 0; font-variant-numeric: tabular-nums; }
.hc-sub { color: color-mix(in oklab, var(--paper) 60%, transparent); font-size: 13px; display: flex; gap: 10px; align-items: center; }
.hc-sub .up { color: var(--accent); font-family: var(--font-mono); font-size: 12px; }
.hc-chart { margin-top: 10px; height: 150px; }
.hc-foot { margin-top: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.hc-foot .cell { border: 1px solid color-mix(in oklab, var(--paper) 14%, transparent); border-radius: 10px; padding: 10px 12px; }
.hc-foot .lbl { font-size: 10px; color: color-mix(in oklab, var(--paper) 55%, transparent); font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; }
.hc-foot .val { font-size: 18px; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }

/* Floating chip */
.chip {
  position: absolute; z-index: 2;
  background: var(--paper); color: var(--ink);
  border-radius: 12px; padding: 10px 12px; font-size: 12px;
  box-shadow: 0 12px 30px -10px rgba(10,18,48,0.35); display: flex; gap: 10px; align-items: center;
}
.chip .pill { background: var(--accent); padding: 3px 7px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; }
.chip-a { top: -14px; left: -18px; }
.chip-b { bottom: 14px; right: -20px; }
@media (max-width: 720px) { .chip-a, .chip-b { display: none; } }

/* Section scaffold */
section { padding: 96px 0; border-top: 1px solid var(--line); }
.section-head { display: flex; justify-content: space-between; align-items: end; gap: 40px; margin-bottom: 48px; }
.section-head h2 { font-family: var(--font-sans); font-weight: 500; font-size: clamp(36px, 4.2vw, 56px); letter-spacing: -0.03em; line-height: 1; margin: 8px 0 0; max-width: 720px; }
.section-head h2 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.section-head p { max-width: 420px; color: var(--mute); margin: 0; font-size: 15px; }
@media (max-width: 820px) { .section-head { flex-direction: column; align-items: start; } }

/* Integrations */
.int-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; }
@media (max-width: 1040px) { .int-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 620px) { .int-grid { grid-template-columns: repeat(3, 1fr); } }
.int-cell {
  background: var(--paper); padding: 20px 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  aspect-ratio: 1; transition: background 0.2s ease;
  position: relative;
}
.int-cell:hover { background: var(--ink); color: var(--paper); }
.int-cell:hover .int-brand { filter: brightness(1.2); }
.int-cell:hover .int-brand.invert-on-dark { filter: invert(1) brightness(1.2); }
.int-cell:hover .int-desc { opacity: 1; max-height: 60px; }
.int-brand { display: flex; align-items: center; justify-content: center; height: 34px; }
.int-brand svg { max-width: 100%; max-height: 100%; height: auto; }
.int-name { font-size: 11px; font-weight: 500; letter-spacing: -0.005em; text-align: center; }
.int-kind { position: absolute; top: 8px; left: 10px; font-family: var(--font-mono); font-size: 9px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.08em; }
.int-cell:hover .int-kind { color: color-mix(in oklab, var(--paper) 60%, transparent); }
.int-desc { font-size: 10.5px; text-align: center; opacity: 0; max-height: 0; overflow: hidden; transition: all 0.25s; color: color-mix(in oklab, var(--paper) 70%, transparent); line-height: 1.35; }
.int-count { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 12px; color: var(--mute); }

/* Dashboard preview */
.dash-wrap { background: var(--ink); border-radius: 24px; padding: 24px; color: var(--paper); position: relative; overflow: hidden; }
.dash-wrap::before { content: ""; position: absolute; inset: 0; background: radial-gradient(800px 400px at 100% 0%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 50%); pointer-events: none; }
.dash-tabs { display: flex; gap: 4px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid color-mix(in oklab, var(--paper) 12%, transparent); padding-bottom: 12px; margin-bottom: 20px; overflow-x: auto; }
.dash-tabs button { background: transparent; border: 0; color: color-mix(in oklab, var(--paper) 55%, transparent); padding: 8px 12px; border-radius: 8px 8px 0 0; white-space: nowrap; }
.dash-tabs button.active { color: var(--ink); background: var(--accent); }
.dash-tabs button:hover:not(.active) { color: var(--paper); }

.dash-body { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
@media (max-width: 900px) { .dash-body { grid-template-columns: 1fr; } }
.dash-panel { border: 1px solid color-mix(in oklab, var(--paper) 12%, transparent); border-radius: 14px; padding: 18px; background: color-mix(in oklab, var(--ink) 50%, black); }
.dp-head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 14px; }
.dp-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: color-mix(in oklab, var(--paper) 55%, transparent); }
.dp-big { font-size: 42px; font-weight: 400; letter-spacing: -0.025em; margin: 2px 0 0; font-variant-numeric: tabular-nums; }
.dp-tag { font-family: var(--font-mono); font-size: 11px; padding: 4px 8px; border-radius: 6px; background: color-mix(in oklab, var(--pos) 25%, transparent); color: var(--accent); }
.dp-tag.neg { background: color-mix(in oklab, var(--neg) 25%, transparent); color: #FFB3B3; }
.kpi-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.kpi { padding: 12px 14px; border: 1px solid color-mix(in oklab, var(--paper) 10%, transparent); border-radius: 10px; }
.kpi .l { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: color-mix(in oklab, var(--paper) 55%, transparent); text-transform: uppercase; }
.kpi .v { font-size: 22px; margin-top: 4px; font-variant-numeric: tabular-nums; letter-spacing: -0.015em; }

/* Features */
.feat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 1000px) { .feat-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .feat-grid { grid-template-columns: 1fr; } }
.feat {
  border: 1px solid var(--line); border-radius: 18px; padding: 24px; background: color-mix(in oklab, var(--paper) 60%, white);
  display: flex; flex-direction: column; gap: 14px; min-height: 280px;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}
.feat:hover { transform: translateY(-3px); box-shadow: 0 20px 40px -20px rgba(10,18,48,0.2); }
.feat.dark { background: var(--ink); color: var(--paper); border-color: var(--ink-3); }
.feat.accent { background: var(--accent); color: var(--ink); border-color: transparent; }
.feat-tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; }
.feat-title { font-size: 24px; letter-spacing: -0.02em; font-weight: 500; line-height: 1.1; }
.feat-body { font-size: 14px; opacity: 0.72; line-height: 1.5; }
.feat-vis { margin-top: auto; }

/* Roles */
.roles { background: var(--ink); color: var(--paper); border-radius: 24px; padding: 40px; position: relative; overflow: hidden; }
.roles-head { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
.roles-head button {
  background: transparent; color: color-mix(in oklab, var(--paper) 60%, transparent);
  border: 1px solid color-mix(in oklab, var(--paper) 18%, transparent);
  padding: 10px 16px; border-radius: 999px; font-size: 13px;
}
.roles-head button.active { background: var(--accent); color: var(--ink); border-color: var(--accent); }
.roles-body { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
@media (max-width: 880px) { .roles-body { grid-template-columns: 1fr; } }
.role-title { font-family: var(--font-sans); font-weight: 500; font-size: 44px; letter-spacing: -0.03em; line-height: 1; }
.role-title em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.role-desc { color: color-mix(in oklab, var(--paper) 70%, transparent); font-size: 16px; line-height: 1.5; margin-top: 16px; max-width: 460px; }
.role-list { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
.role-list li { list-style: none; display: flex; gap: 12px; align-items: start; font-size: 14px; }
.role-list .chk { color: var(--accent); font-family: var(--font-mono); }
.role-card {
  background: color-mix(in oklab, var(--ink) 50%, black); border: 1px solid color-mix(in oklab, var(--paper) 12%, transparent);
  border-radius: 16px; padding: 20px;
}

/* WhatsApp */
.wa-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
@media (max-width: 900px) { .wa-wrap { grid-template-columns: 1fr; } }
.phone-frame {
  background: var(--ink); border-radius: 36px; padding: 12px; max-width: 340px; margin: 0 auto;
  box-shadow: 0 30px 60px -30px rgba(10,18,48,0.4);
}
.phone-screen { background: #E5DDD5; border-radius: 28px; height: 560px; padding: 12px 10px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; position: relative; }
.wa-header { background: #075E54; color: white; border-radius: 10px 10px 0 0; padding: 10px 12px; display: flex; gap: 10px; align-items: center; margin: -12px -10px 4px; }
.wa-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: var(--ink); font-weight: 700; font-size: 13px; }
.wa-name { font-size: 14px; font-weight: 600; }
.wa-status { font-size: 11px; opacity: 0.8; }
.bubble { max-width: 84%; padding: 8px 10px; border-radius: 10px; font-size: 13px; background: white; color: #111; line-height: 1.35; position: relative; align-self: flex-start; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
.bubble.me { align-self: flex-end; background: #DCF8C6; }
.bubble .time { font-size: 10px; color: rgba(0,0,0,0.45); margin-left: 8px; }
.bubble .mini-chart { margin-top: 6px; height: 44px; border-radius: 6px; overflow: hidden; }
.bubble .mini-kpi { display: flex; gap: 10px; margin-top: 4px; }
.bubble .mini-kpi span { font-family: var(--font-mono); font-size: 11px; }

/* Social proof */
.quotes { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 16px; }
@media (max-width: 1100px) { .quotes { grid-template-columns: 1fr 1fr; } }
@media (max-width: 720px) { .quotes { grid-template-columns: 1fr; } }
.quote { border: 1px solid var(--line); border-radius: 18px; padding: 26px; background: color-mix(in oklab, var(--paper) 60%, white); display: flex; flex-direction: column; gap: 18px; min-height: 240px; }
.quote.big { background: var(--ink); color: var(--paper); border-color: transparent; }
.quote-text { font-family: var(--font-serif); font-size: 26px; line-height: 1.2; letter-spacing: -0.01em; }
.quote.big .quote-text { font-size: 32px; }
.quote-foot { display: flex; align-items: center; gap: 12px; margin-top: auto; font-size: 13px; }
.qf-avatar { width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%; background: var(--accent); color: var(--ink); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; }
.quote.big .qf-avatar { background: var(--accent); }
.qf-name { font-weight: 500; }
.qf-role { color: var(--mute); font-size: 12px; }
.quote.big .qf-role { color: color-mix(in oklab, var(--paper) 65%, transparent); }

/* Pricing */
.price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: stretch; }
@media (max-width: 900px) { .price-grid { grid-template-columns: 1fr; } }
.price {
  border: 1px solid var(--line); border-radius: 20px; padding: 30px; background: color-mix(in oklab, var(--paper) 60%, white);
  display: flex; flex-direction: column; gap: 18px;
}
.price.hi { background: var(--ink); color: var(--paper); border-color: transparent; position: relative; }
.price.hi::before {
  content: "Most popular"; position: absolute; top: -12px; left: 30px;
  background: var(--accent); color: var(--ink); font-size: 11px; font-family: var(--font-mono);
  letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 10px; border-radius: 999px;
}
.price-name { font-size: 20px; font-weight: 500; }
.price-val { font-size: 52px; letter-spacing: -0.03em; font-weight: 400; font-variant-numeric: tabular-nums; }
.price-val .mo { font-size: 14px; color: var(--mute); margin-left: 4px; }
.price.hi .price-val .mo { color: color-mix(in oklab, var(--paper) 60%, transparent); }
.price-desc { color: var(--mute); font-size: 14px; line-height: 1.5; }
.price.hi .price-desc { color: color-mix(in oklab, var(--paper) 68%, transparent); }
.price-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
.price-list li { display: flex; gap: 10px; align-items: start; }
.price-list .chk { color: var(--ink); font-family: var(--font-mono); font-size: 11px; margin-top: 2px; }
.price.hi .price-list .chk { color: var(--accent); }

/* FAQ */
.faq-list { display: flex; flex-direction: column; border-top: 1px solid var(--line); }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-q { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; cursor: pointer; gap: 20px; }

.faq-plus { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--line-strong); display: grid; place-items: center; font-family: var(--font-mono); transition: transform 0.25s ease, background 0.25s; flex-shrink: 0; }
.faq-item.open .faq-plus { transform: rotate(45deg); background: var(--accent); border-color: transparent; }
.faq-a { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; color: var(--mute); font-size: 15px; line-height: 1.55; }
.faq-item.open .faq-a { max-height: 240px; padding-bottom: 24px; max-width: 760px; }

/* Footer + CTA */
.cta-card {
  background: var(--ink); color: var(--paper); border-radius: 28px; padding: 72px 48px;
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 40px; align-items: center;
  position: relative; overflow: hidden;
}
.cta-card::after { content: ""; position: absolute; inset: 0; background: radial-gradient(700px 300px at 0% 100%, color-mix(in oklab, var(--accent) 18%, transparent), transparent 55%); pointer-events: none; }

.cta-h { font-size: clamp(32px, 4.2vw, 58px); letter-spacing: -0.025em; font-weight: 500; line-height: 1.08; margin-bottom: 12px; }
.cta-h em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.cta-sub { color: color-mix(in oklab, var(--paper) 68%, transparent); margin-top: 24px; font-size: 16px; max-width: 460px; line-height: 1.5; }

footer { padding: 56px 0 40px; border-top: 1px solid var(--line); }
.foot-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 40px; }
@media (max-width: 820px) { .foot-grid { grid-template-columns: 1fr 1fr; } }
.foot-col h5 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mute); margin: 0 0 14px; font-weight: 500; }
.foot-col a { display: block; padding: 5px 0; font-size: 14px; color: var(--ink); opacity: 0.8; }
.foot-col a:hover { opacity: 1; }
.foot-meta { border-top: 1px solid var(--line); padding-top: 20px; margin-top: 36px; display: flex; justify-content: space-between; color: var(--mute); font-size: 12px; font-family: var(--font-mono); letter-spacing: 0.04em; }

/* Tweaks panel */
.tw-fab { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: var(--ink); color: var(--paper); border-radius: 999px; padding: 12px 18px; display: none; align-items: center; gap: 10px; border: 0; font-size: 13px; box-shadow: 0 10px 30px -10px rgba(10,18,48,0.5); }
.tw-fab.on { display: inline-flex; }
.tw-panel { position: fixed; bottom: 80px; right: 20px; z-index: 101; width: 320px; background: var(--paper); border: 1px solid var(--line-strong); border-radius: 18px; padding: 18px; box-shadow: 0 30px 60px -20px rgba(10,18,48,0.35); display: none; }
.tw-panel.open { display: block; }
.tw-panel h3 { margin: 0 0 14px; font-size: 15px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
.tw-panel label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mute); display: block; margin: 14px 0 6px; }
.tw-seg { display: flex; gap: 4px; flex-wrap: wrap; }
.tw-seg button { flex: 1; min-width: 0; padding: 8px 6px; border-radius: 8px; border: 1px solid var(--line-strong); background: transparent; font-size: 11px; color: var(--ink); }
.tw-seg button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.tw-panel input[type="text"], .tw-panel textarea { width: 100%; border: 1px solid var(--line-strong); border-radius: 8px; padding: 8px 10px; font-family: var(--font-sans); font-size: 12px; background: white; color: var(--ink); resize: vertical; }
.tw-panel .tw-close { background: transparent; border: 0; color: var(--mute); font-size: 18px; padding: 0; }

/* Reveal on scroll */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
.reveal.visible { opacity: 1; transform: none; }

/* Utility */
.mono { font-family: var(--font-mono); }
.serif-i { font-family: var(--font-serif); font-style: italic; }
.num { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.divider { height: 1px; background: var(--line); margin: 0; }

/* Marquee */
.marquee { overflow: hidden; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--paper-2); }
.marquee-track { display: flex; gap: 48px; padding: 14px 0; white-space: nowrap; animation: marquee 38s linear infinite; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; color: var(--mute); text-transform: uppercase; }
.marquee-track span { display: inline-flex; align-items: center; gap: 48px; }
.marquee-track span::before { content: "◆"; color: var(--ink); opacity: 0.4; }
@keyframes marquee { to { transform: translateX(-50%); } }

</style>
<style>
/* Sub-page shared styles */

/* Banks placeholder special */

  background: linear-gradient(135deg, var(--ink) 0%, var(--ink-2) 100%);
  color: var(--paper); border-radius: 24px; padding: 40px;

}

.bank-banner::after {

}
.bank-banner h3 { font-size: 36px; letter-spacing: -0.025em; margin: 0; font-weight: 500; line-height: 1.05; }

.bank-banner .psd2 { display: inline-flex; align-items: center; gap: 8px; background: color-mix(in oklab, var(--accent) 25%, transparent); color: var(--accent); font-family: var(--font-mono); font-size: 11px; padding: 5px 10px; border-radius: 999px; letter-spacing: 0.08em; }
.bank-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.bank-card { background: color-mix(in oklab, var(--paper) 10%, transparent); border: 1px solid color-mix(in oklab, var(--paper) 16%, transparent); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; }

.mf-feature { display: grid; grid-template-columns: 1.1fr 1fr; gap: 40px; align-items: center; padding: 56px 0; border-top: 1px solid var(--line); }
.mf-feature:nth-child(even) { grid-template-columns: 1fr 1.1fr; }
.mf-feature:nth-child(even) .mf-text { order: 2; }

.mf-text h3 { font-family: var(--font-sans); font-weight: 500; font-size: clamp(28px, 3.2vw, 40px); letter-spacing: -0.025em; line-height: 1.05; margin: 10px 0 14px; }
.mf-text p { color: var(--mute); font-size: 16px; line-height: 1.55; max-width: 480px; margin: 0 0 16px; }

.scenario-tabs button { background: transparent; border: 0; color: color-mix(in oklab, var(--paper) 65%, transparent); padding: 6px 12px; border-radius: 7px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }

/* Cohort forecast grid */
.forecast-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
